# Sample Handoff Contract: Security Reviewer → Orchestrator
handoff_contract:
  id: security-reviewer_handoff
  from_roles:
    - backend-developer
    - fullstack-developer
  allowed_next_roles:
    - orchestrator
    - technical-writer
  required_fields:
    - risk_summary
    - severity_labels
    - recommended_fixes
    - approval_or_block
  validation_rules:
    - field: risk_summary
      required: true
      min_length: 50
    - field: severity_labels
      required: true
      min_items: 1
    - field: approval_or_block
      required: true
      enum: ["approve", "block", "needs_discussion"]
  completion_gate:
    required:
      - explicit_approve_or_block
      - no_code_modification
