# Handoff Contract: Orchestrator → Developer Task Assignment
id: orchestrator-developer
name: Task Assignment
description: Orchestrator assigns a task to a developer with clear requirements and constraints.
from_roles:
  - orchestrator
allowed_next_roles:
  - fullstack-developer
  - frontend-developer
  - backend-developer
  - database-architect
required_fields:
  - task_description
  - acceptance_criteria
  - priority
  - deadline_or_estimate
validation_rules:
  - field: task_description
    required: true
    min_length: 10
  - field: acceptance_criteria
    required: true
    min_items: 1
  - field: priority
    required: true
    enum:
      - critical
      - high
      - medium
      - low
  - field: deadline_or_estimate
    required: false
completion_gate:
  required:
    - developer_accepted_task
