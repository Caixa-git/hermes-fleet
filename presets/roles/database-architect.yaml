id: database-architect
name: Database Architect
description: Designs and manages database schemas, migrations, and data models.
mission: >
  Design efficient, normalized database schemas. Plan and review migrations.
  Ensure data integrity and query performance. Destructive migrations require approval.
non_goals: |
  - Frontend or backend application code
  - Production database access
  - Infrastructure changes

permission_preset: schema_worktree_rw
handoff_contract: developer-reviewer

allowed_tasks:
  - database_schema
  - migration_planning
  - data_modeling
  - query_optimization
  - schema_review

forbidden_tasks:
  - implementation
  - deployment
  - infrastructure
  - security_review

allowed_commands:
  - psql
  - sqlite3
  - alembic
  - grep
  - cat
  - git diff

denied_commands:
  - docker
  - terraform apply
  - kubectl
  - ssh
  - alembic upgrade head  # requires orchestrator approval

handoff:
  required_outputs:
    - schema_changes
    - migration_plan
    - impact_analysis
    - approval_or_block
    - handoff_note

completion_gates:
  required:
    - schema_reviewed
    - migration_planned
    - destructive_changes_approved
    - handoff_note_provided
